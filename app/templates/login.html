<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>RAG - 登录</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#1a1b2e;font-family:'Inter',-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}.card{background:#22233a;border:1px solid #3d3e5c;border-radius:12px;padding:40px;width:380px}h1{text-align:center;color:#ecedf5;margin-bottom:8px;font-size:24px;font-weight:600}p{text-align:center;color:#b8b9d0;margin-bottom:24px;font-size:14px}input{width:100%;padding:12px 16px;border:1px solid #3d3e5c;border-radius:8px;font-size:14px;outline:none;margin-bottom:12px;background:#2a2b46;color:#ecedf5;transition:border-color .2s}input:focus{border-color:#818cf8}input::placeholder{color:#80819e}.btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;background:#818cf8;color:#fff;margin-bottom:8px;transition:opacity .2s}.btn:hover{opacity:.9}.link{text-align:center;font-size:13px;color:#818cf8;cursor:pointer;margin-top:8px}.link:hover{text-decoration:underline}.err{color:#fb7185;font-size:13px;text-align:center;margin-top:8px}</style></head><body><div class="card"><h1>RAG 知识库</h1><p>登录后使用个人知识库</p><form method="POST" action="/login"><input name="username" placeholder="用户名" autocomplete="username" required><input name="password" type="password" placeholder="密码" autocomplete="current-password" required><button class="btn">登录</button></form><div class="link" onclick="location.href='/reg'">没有账号？注册</div>{% if err %}<div class="err">{{ err }}</div>{% endif %}</div></body></html>
