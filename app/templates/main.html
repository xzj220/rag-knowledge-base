<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RAG 知识库</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1b2e;--surface:#22233a;--border:#3d3e5c;--text:#ecedf5;--text2:#b8b9d0;--accent:#818cf8;--accent2:#6366f1;--danger:#fb7185;--success:#34d399;--radius:8px;--font:'Inter',-apple-system,sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);height:100vh;display:flex;overflow:hidden}

/* ===== SIDEBAR ===== */
.sidebar{width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:transform .25s ease;z-index:100}
.sidebar.hidden{transform:translateX(-280px);display:none}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sidebar-header h2{font-size:16px;font-weight:600}
.sidebar-header .badge{background:var(--accent);color:#fff;font-size:11px;padding:1px 7px;border-radius:10px;margin-left:4px}
.new-chat{margin:12px;padding:10px;border:1px dashed var(--border);border-radius:var(--radius);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.new-chat:hover{border-color:var(--accent);color:var(--accent)}
.conv-list{flex:1;overflow-y:auto;padding:4px 8px}
.conv-item{padding:10px 12px;border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text2);display:flex;align-items:center;justify-content:space-between;gap:8px;transition:background .15s}
.conv-item:hover{background:#2e2f4e}
.conv-item.active{background:var(--accent);color:#fff}
.conv-item .title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.conv-item .del{opacity:0;background:none;border:none;color:inherit;font-size:15px;cursor:pointer;padding:0 2px;transition:opacity .2s}
.conv-item:hover .del{opacity:.5}
.conv-item .del:hover{opacity:1}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:13px;color:var(--text2)}
.sidebar-footer a{color:var(--accent);text-decoration:none}
.sidebar-footer a:hover{text-decoration:underline}
.logout-btn{padding:4px 10px;border:1px solid var(--border);border-radius:var(--radius);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;transition:all .2s}
.logout-btn:hover{border-color:var(--danger);color:var(--danger)}

/* ===== MAIN ===== */
.main{flex:1;display:flex;flex-direction:column;max-width:calc(100vw - 280px);width:100%}
.main.full{max-width:100vw}

/* ===== TOP BAR ===== */
.top-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.toggle-btn{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:4px;border-radius:4px;transition:all .2s}
.toggle-btn:hover{background:var(--surface);color:var(--text)}
.top-bar .title{font-size:14px;color:var(--text2);flex:1}

/* ===== CHAT ===== */
.chat-area{flex:1;overflow-y:auto;padding:20px 0}
.chat-area .inner{max-width:800px;margin:0 auto;padding:0 20px}
.msg{margin-bottom:20px;display:flex;gap:12px}
.msg.user{flex-direction:row-reverse}
.msg .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
.msg.user .avatar{background:var(--accent);color:#fff}
.msg.assistant .avatar{background:var(--success);color:#fff;font-size:18px}
.msg .bubble{max-width:75%;padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.6;word-break:break-word}
.msg.user .bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.msg.assistant .bubble{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg .bubble p{margin:6px 0}
.msg .bubble ul,.msg .bubble ol{padding-left:20px;margin:6px 0}
.msg .bubble li{margin:3px 0}
.msg .bubble code{background:#2a2b46;padding:2px 6px;border-radius:4px;font-size:13px}
.msg .bubble pre{background:#2a2b46;padding:12px;border-radius:8px;overflow-x:auto;margin:8px 0}
.msg .bubble pre code{background:none;padding:0}
.msg .bubble sup{color:var(--accent);font-size:11px;cursor:pointer}
.msg .bubble sup:hover{text-decoration:underline}
.sources{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;font-size:11px;color:var(--text2)}
.sources span{background:#2a2b46;padding:2px 8px;border-radius:4px;border:1px solid var(--border)}
.typing .bubble{color:var(--text2);font-size:13px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.empty-state{text-align:center;padding:80px 20px;color:var(--text2)}
.empty-state h2{font-size:22px;margin-bottom:8px;color:var(--text)}
.empty-state p{font-size:14px;max-width:400px;margin:0 auto 24px;line-height:1.6}
.search-hint{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);padding:6px 12px;border-radius:var(--radius);font-size:12px;color:var(--text2)}

/* ===== INPUT ===== */
.input-area{flex-shrink:0;border-top:1px solid var(--border);padding:16px 20px}
.input-wrap{max-width:800px;margin:0 auto;display:flex;gap:8px;align-items:flex-end}
.input-wrap textarea{flex:1;padding:12px 16px;border:1px solid var(--border);border-radius:12px;background:var(--surface);color:var(--text);font-size:14px;outline:none;resize:none;font-family:var(--font);max-height:150px;transition:border-color .2s}
.input-wrap textarea:focus{border-color:var(--accent)}
.input-wrap textarea::placeholder{color:#80819e}
.send-btn{width:44px;height:44px;border:none;border-radius:50%;background:var(--accent);color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;transition:opacity .2s;display:flex;align-items:center;justify-content:center}
.send-btn:hover{opacity:.85}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.input-tools{display:flex;gap:8px;margin-top:6px;max-width:800px;margin-left:auto;margin-right:auto}
.tool-btn{background:transparent;border:1px solid var(--border);border-radius:var(--radius);padding:5px 10px;font-size:12px;color:var(--text2);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:4px}
.tool-btn:hover{border-color:var(--accent);color:var(--accent)}
#fileInput{display:none}

/* ===== KB MODAL ===== */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:90%;max-width:700px;max-height:80vh;display:flex;flex-direction:column}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:16px;font-weight:600}
.modal-close{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:0 4px}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.btn{padding:8px 18px;border:none;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn.primary{background:var(--accent);color:#fff}
.btn.danger{background:var(--danger);color:#fff}
.btn.secondary{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.kb-item{padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.kb-item .text{flex:1;font-size:13px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kb-item .del-btn{background:none;border:none;color:var(--danger);font-size:16px;cursor:pointer;padding:0 4px;opacity:.6;transition:opacity .2s}
.kb-item .del-btn:hover{opacity:1}
.kb-empty{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px}
.kb-batch{padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px}
.kb-batch textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:#2a2b46;color:var(--text);font-size:13px;outline:none;resize:vertical;min-height:80px;font-family:var(--font)}
.kb-batch textarea:focus{border-color:var(--accent)}
.kb-count{font-size:12px;color:var(--text2);margin-top:4px}
.kb-select-all{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);margin-bottom:8px;cursor:pointer}
.kb-select-all input{cursor:pointer}
@media(max-width:768px){.sidebar{position:fixed;left:0;top:0;bottom:0;z-index:99}.sidebar.hidden{transform:translateX(-280px)}.main{max-width:100vw}.msg .bubble{max-width:90%}}
</style>
</head>
<body>
<div class="sidebar" id="sidebar">
<div class="sidebar-header">
<h2>RAG</h2><span class="badge">{{ user }}</span>
</div>
<button class="new-chat" onclick="newConv()">+ 新对话</button>
<div class="conv-list" id="convList"></div>
<div class="sidebar-footer">
<a href="javascript:" onclick="showKB()">知识库</a>
<button class="logout-btn" onclick="location.href='/logout'">退出</button>
</div>
</div>
<div class="main" id="main">
<div class="top-bar">
<button class="toggle-btn" onclick="toggleSidebar()">☰</button>
<span class="title">RAG 知识库问答</span>
</div>
<div class="chat-area" id="chatArea">
<div class="inner" id="chatInner">
<div class="empty-state" id="emptyState">
<h2>开始提问</h2>
<p>从知识库中检索相关内容，AI 会基于检索结果给出回答。你也可以上传文档来扩充知识库。</p>
<div class="search-hint">Ctrl+K 快速输入 · Ctrl+L 新建对话</div>
</div>
</div>
</div>
<div class="input-area">
<div class="input-wrap">
<textarea id="chatInput" rows="1" placeholder="输入问题..." onkeydown="onKeydown(event)"></textarea>
<button class="send-btn" id="sendBtn" onclick="sendMsg()">➤</button>
</div>
<div class="input-tools">
<button class="tool-btn" onclick="document.getElementById('fileInput').click()">📄 上传文档</button>
<button class="tool-btn" onclick="showKB()">📚 知识库</button>
<input type="file" id="fileInput" multiple onchange="uploadFile(event)">
</div>
</div>
</div>

<div class="modal-overlay" id="kbModal">
<div class="modal">
<div class="modal-header"><h3 id="kbTitle">知识库</h3><button class="modal-close" onclick="hideKB()">×</button></div>
<div class="modal-body" id="kbBody"></div>
<div class="modal-footer">
<button class="btn secondary" onclick="toggleBatch()" id="batchToggle">批量录入</button>
<button class="btn danger" onclick="clearAll()">清空全部</button>
<button class="btn primary" onclick="hideKB()">关闭</button>
</div>
</div>
</div>

<script>
// ===== STATE =====
let currentConvId = null
let allMsgs = []
let sending = false
let kbCache = {docs:[], selected:new Set()}

// ===== SIDEBAR =====
function toggleSidebar(){
const s=document.getElementById('sidebar'),m=document.getElementById('main')
s.classList.toggle('hidden');m.classList.toggle('full')
}
function newConv(){currentConvId=null;allMsgs=[];document.getElementById('chatInner').innerHTML=document.getElementById('emptyState').outerHTML;document.getElementById('chatInput').focus();document.querySelectorAll('.conv-item').forEach(e=>e.classList.remove('active'))}

// ===== CONV LIST =====
async function loadConvList(){
try{
const r=await fetch('/conversations'),list=await r.json()
const el=document.getElementById('convList');el.innerHTML=list.map(c=>'<div class="conv-item'+(c.id===currentConvId?' active':'')+'" data-id="'+c.id+'" onclick="loadConv(\''+c.id+'\')"><span class="title">'+escapeHtml(c.title||'新对话')+'</span><button class="del" onclick="event.stopPropagation();delConv(\''+c.id+'\')">×</button></div>').join('')
}catch(e){}
}
async function delConv(id){
if(!confirm('删除此对话？'))return
await fetch('/conversations/'+id,{method:'DELETE'});loadConvList()
if(currentConvId===id)newConv()
}
async function loadConv(id){
currentConvId=id;document.querySelectorAll('.conv-item').forEach(e=>e.classList.remove('active'))
document.querySelector('.conv-item[data-id="'+id+'"]').classList.add('active')
try{
const r=await fetch('/conversations'),list=await r.json()
const c=list.find(x=>x.id===id);if(!c)return
allMsgs=c.messages||[]
const el=document.getElementById('chatInner')
el.innerHTML=allMsgs.map(m=>renderMsg(m)).join('')||document.getElementById('emptyState').outerHTML
el.scrollTop=el.scrollHeight
document.querySelector('#chatArea').scrollTop=document.querySelector('#chatArea').scrollHeight
}catch(e){}
}
function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function renderMsg(m){
if(m.role==='user')return '<div class="msg user"><div class="avatar">U</div><div class="bubble">'+escapeHtml(m.text)+'</div></div>'
let src='';if(m.sources&&m.sources.length)src='<div class="sources">'+m.sources.map((s,i)=>'<span title="score:'+s.score+'">['+(i+1)+']</span>').join('')+'</div>'
return '<div class="msg assistant"><div class="avatar">🤖</div><div class="bubble">'+m.html+src+'</div></div>'
}

// ===== SEND =====
function onKeydown(e){
if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}
if(e.key==='k'&&(e.ctrlKey||e.metaKey)){e.preventDefault();document.getElementById('chatInput').focus()}
if(e.key==='l'&&(e.ctrlKey||e.metaKey)){e.preventDefault();newConv()}
if(e.key==='b'&&(e.ctrlKey||e.metaKey)){e.preventDefault();toggleSidebar()}
}
async function sendMsg(){
if(sending)return
const inp=document.getElementById('chatInput'),q=inp.value.trim()
if(!q)return
inp.value='';autoResize(inp)
sending=true;document.getElementById('sendBtn').disabled=true
const userMsg={role:'user',text:q}
allMsgs.push(userMsg)
const el=document.getElementById('chatInner')
if(document.getElementById('emptyState'))el.innerHTML=''
el.insertAdjacentHTML('beforeend',renderMsg(userMsg))
el.insertAdjacentHTML('beforeend','<div class="msg assistant typing" id="typing"><div class="avatar">🤖</div><div class="bubble">思考中...</div></div>')
document.querySelector('#chatArea').scrollTop=document.querySelector('#chatArea').scrollHeight
try{
const r=await fetch('/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({q,conv_id:currentConvId})})
const d=await r.json()
const typingEl=document.getElementById('typing');if(typingEl)typingEl.remove()
const md=marked?marked.parse(d.answer):escapeHtml(d.answer)
const assistantMsg={role:'assistant',html:md,text:d.answer,sources:d.sources||[]}
allMsgs.push(assistantMsg)
if(allMsgs.length===2){//first exchange => auto-save
const title=q.length>30?q.slice(0,30)+'...':q
await fetch('/conversations',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:currentConvId||'',title,messages:allMsgs})})
if(!currentConvId)currentConvId=document.querySelector('.conv-item.active')?.dataset?.id
loadConvList()
}else{
const existing=document.querySelector('.conv-item.active')
if(existing){
await fetch('/conversations',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:currentConvId,messages:allMsgs})})
}
}
el.insertAdjacentHTML('beforeend',renderMsg(assistantMsg))
document.querySelector('#chatArea').scrollTop=document.querySelector('#chatArea').scrollHeight
}catch(e){
const typingEl=document.getElementById('typing');if(typingEl)typingEl.remove()
el.insertAdjacentHTML('beforeend','<div class="msg assistant"><div class="avatar">🤖</div><div class="bubble">请求失败，请重试</div></div>')
}finally{sending=false;document.getElementById('sendBtn').disabled=false;inp.focus()}
}

// ===== AUTO RESIZE =====
function autoResize(t){t.style.height='auto';t.style.height=Math.min(t.scrollHeight,150)+'px'}
document.getElementById('chatInput').addEventListener('input',function(){autoResize(this)})

// ===== UPLOAD =====
async function uploadFile(e){
const files=e.target.files;if(!files.length)return
e.target.value=''
for(const f of files){
const fd=new FormData();fd.append('file',f)
const el=document.getElementById('chatInner')
el.insertAdjacentHTML('beforeend','<div class="msg assistant"><div class="avatar">🤖</div><div class="bubble">📄 上传中: '+f.name+'...</div></div>')
document.querySelector('#chatArea').scrollTop=document.querySelector('#chatArea').scrollHeight
try{
const r=await fetch('/upload',{method:'POST',body:fd})
const d=await r.json()
el.insertAdjacentHTML('beforeend','<div class="msg assistant"><div class="avatar">🤖</div><div class="bubble">'+escapeHtml(d.msg)+'</div></div>')
document.querySelector('#chatArea').scrollTop=document.querySelector('#chatArea').scrollHeight
}catch(e){}
}
}

// ===== KB MODAL =====
function showKB(){document.getElementById('kbModal').classList.add('show');loadKB()}
function hideKB(){document.getElementById('kbModal').classList.remove('show')}
let batchMode=false
function toggleBatch(){batchMode=!batchMode;document.getElementById('batchToggle').textContent=batchMode?'返回列表':'批量录入';loadKB()}
async function loadKB(){
const el=document.getElementById('kbBody')
if(batchMode){
el.innerHTML='<div class="kb-batch"><textarea id="batchText" placeholder="每行一条，格式：问题是什么回答"></textarea><div class="kb-count">提示：用"是"分隔问题和答案，例如：今天天气怎么样？是今天天气晴朗</div></div><button class="btn primary" onclick="submitBatch()">提交</button>'
return
}
try{
const r=await fetch('/kb_docs'),d=await r.json()
const docs=d.docs||[];kbCache.docs=docs;kbCache.selected=new Set()
if(!docs.length){el.innerHTML='<div class="kb-empty">知识库为空，上传文档来添加知识</div>';return}
el.innerHTML='<label class="kb-select-all"><input type="checkbox" onchange="toggleAll(this)"> 全选</label>'+docs.map((x,i)=>'<div class="kb-item" data-idx="'+i+'"><span class="text">'+(x.source||'?')+': '+escapeHtml(x.text.slice(0,80))+'</span><input type="checkbox" class="kb-cb" data-idx="'+i+'" onchange="toggleOne('+i+')"><button class="del-btn" onclick="deleteOne('+i+')">×</button></div>').join('')
}catch(e){el.innerHTML='<div class="kb-empty">加载失败</div>'}
}
function toggleAll(el){document.querySelectorAll('.kb-cb').forEach(c=>{c.checked=el.checked;const i=parseInt(c.dataset.idx);el.checked?kbCache.selected.add(i):kbCache.selected.delete(i)})}
function toggleOne(i){kbCache.selected.has(i)?kbCache.selected.delete(i):kbCache.selected.add(i)}
async function deleteOne(i){
if(!confirm('删除此条？'))return
const r=await fetch('/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({idx:i})})
const d=await r.json()
if(d.ok)loadKB()
}
async function clearAll(){
if(!confirm('确认清空所有知识？'))return
await fetch('/clear_all',{method:'POST'});loadKB()
}
async function submitBatch(){
const text=document.getElementById('batchText').value.trim()
if(!text)return
const r=await fetch('/add_batch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})})
const d=await r.json()
if(d.msg.includes('成功')){batchMode=false;document.getElementById('batchToggle').textContent='批量录入'}
loadKB()
}

// ===== INIT =====
loadConvList()
document.getElementById('chatInput').focus()
</script>
</body></html>
